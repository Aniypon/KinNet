{% extends "base.html" %}
{% block title %}Новая капсула{% endblock %}
{% block content %}
<section class="card">
  <h1>Новая капсула</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <label>Семья</label>
    <select name="family" required>
      {% for f in families %}<option value="{{ f.id }}">{{ f.name }}</option>{% endfor %}
    </select>
    <label>Название</label><input name="title" required>
    <label>Сообщение</label><textarea name="message" rows="6"></textarea>
    <label>Раскрыть в</label><input name="reveal_at" type="datetime-local" required>
    <label>Файл (опционально)</label><input name="media" type="file">
    <button class="btn" type="submit">Запланировать</button>
  </form>
</section>
{% endblock %}
