{% extends "base.html" %}
{% block title %}Новый расход{% endblock %}
{% block content %}
<section class="card">
  <h1>Новый расход</h1>
  <form method="post">
    {% csrf_token %}
    <label>Семья</label>
    <select name="family" required>
      {% for f in families %}<option value="{{ f.id }}">{{ f.name }}</option>{% endfor %}
    </select>
    <label>Название</label><input name="title" required>
    <label>Сумма</label><input name="amount" type="number" step="0.01" required>
    <label>Категория</label><input name="category" placeholder="продукты, аренда">
    <label>Дата</label><input name="spent_on" type="date">
    <label>Заметки</label><textarea name="notes" rows="2"></textarea>
    <button class="btn" type="submit">Сохранить</button>
  </form>
</section>
{% endblock %}
