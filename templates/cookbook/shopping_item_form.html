{% extends "base.html" %}
{% block title %}Изменить пункт — {{ shopping_list.name }}{% endblock %}
{% block content %}
<section class="page-hero work-page-hero" data-reveal>
  <div>
    <a class="btn small secondary" href="{% url 'cookbook:shopping_list_detail' shopping_list.id %}"><i data-lucide="arrow-left"></i>К списку</a>
    <span class="kicker">покупки</span>
    <h1>Изменить пункт</h1>
    <p class="meta">{{ shopping_list.name }}</p>
  </div>
</section>

<section class="surface" data-reveal>
  <form method="post" action="{% url 'cookbook:shopping_item_update' item.id %}" class="compact-form">
    {% csrf_token %}
    <label>
      <span class="meta">Название</span>
      <input name="name" value="{{ item.name }}" required autofocus>
    </label>
    <label>
      <span class="meta">Количество</span>
      <input name="quantity" value="{{ item.quantity }}" placeholder="Кол-во">
    </label>
    <label>
      <span class="meta">Единица</span>
      <input name="unit" value="{{ item.unit }}" placeholder="шт, г, мл…">
    </label>
    <div class="card-actions">
      <button class="btn" type="submit"><i data-lucide="check"></i>Сохранить</button>
      <a class="btn secondary" href="{% url 'cookbook:shopping_list_detail' shopping_list.id %}">Отмена</a>
    </div>
  </form>
</section>
{% endblock %}
