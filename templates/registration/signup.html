{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
  <section class="page-hero" data-reveal>
    <span class="kicker">новый семейный круг</span>
    <h1>Создать аккаунт</h1>
    <p>Начните с профиля, затем добавьте семью, даты и близких.</p>
  </section>

  <section class="form-shell" style="max-width: 460px; margin: 0 auto;" data-reveal>
    <form method="post">
      {% csrf_token %}
      {% include "partials/form_fields.html" with form=form %}
      <button class="btn" type="submit">Создать аккаунт</button>
    </form>
    <p class="meta" style="margin-top: 12px;">
      Уже есть аккаунт? <a href="/accounts/login/">Войти</a>
    </p>
  </section>
{% endblock %}
