{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
  <section class="card" style="max-width: 420px; margin: 0 auto;">
    <h2>Вход</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn" type="submit">Войти</button>
    </form>
    <p class="meta" style="margin-top: 12px;">
      Нет аккаунта? <a href="/signup/">Создать</a>
    </p>
  </section>
{% endblock %}
