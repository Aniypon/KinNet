{% extends "base.html" %}
{% block title %}{% if poll %}Изменить опрос{% else %}Новый опрос{% endif %}{% endblock %}
{% block content %}
{% include "partials/section_header.html" with title=page_title %}

<section class="form-shell" style="max-width: 760px; margin: 0 auto;" data-reveal>
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="family" value="{{ family.id }}">
    <label for="poll-question">Вопрос</label>
    <input id="poll-question" name="question" value="{{ poll.question|default:'' }}" required>
    <label for="poll-description">Описание</label>
    <textarea id="poll-description" name="description" rows="3">{{ poll.description|default:'' }}</textarea>
    <label class="checkbox-row">
      <input type="checkbox" name="allow_multiple" {% if poll and poll.allow_multiple %}checked{% endif %}>
      <span>Разрешить несколько вариантов</span>
    </label>
    <label for="poll-closes-at">Закроется (необязательно)</label>
    <input id="poll-closes-at" type="text" data-mask="datetime" inputmode="numeric" autocomplete="off" placeholder="дд.мм.гггг чч:мм" name="closes_at" value="{% if poll.closes_at %}{{ poll.closes_at|date:'d.m.Y H:i' }}{% endif %}">
    {% if poll %}
      <label class="checkbox-row">
        <input type="checkbox" name="is_closed" {% if poll.is_closed %}checked{% endif %}>
        <span>Закрыть опрос</span>
      </label>
    {% endif %}
    <label for="poll-choices">Варианты (по строке)</label>
    <textarea id="poll-choices" name="choices" rows="6" required>{{ choices_text|default:'' }}</textarea>
    <div class="card-actions">
      <button class="btn" type="submit">{% if poll %}Сохранить{% else %}Создать{% endif %}</button>
      <a class="btn secondary" href="{% url 'polls:poll_list' %}?family={{ family.id }}">Отмена</a>
    </div>
  </form>
</section>
{% endblock %}
